name: Goodreads reading list workflow

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-goodreads:
    name: Update README with Goodreads reading list
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Goodreads RSS
        run: |
          echo "Checking Goodreads RSS response..."
          curl -L "https://www.goodreads.com/review/list_rss/200390160?shelf=read" | head -n 40

      - name: Pull completed reads
        uses: zwacky/goodreads-profile-workflow@v1.2.4
        with:
          goodreads_user_id: "200390160"
          shelf: "read"
          comment_tag_name: "GOODREADS-READ-LIST"